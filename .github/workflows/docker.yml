name: Build and push Docker image

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch: # allow manual builds for any branch or tag

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Two-stage release mirrors the npm workflow: the registry push credential is
# isolated from the job that runs untrusted dependency code. The image build runs
# `npm ci` / build scripts inside the Dockerfile, so the build job holds NO
# packages:write and never logs in to the registry. It exports the built image as
# an artifact; the push job — which runs no dependency code — copies that artifact
# to the registry. A compromised dependency therefore cannot reach the push token.
#
# Publishing happens only from version tags (`v*`); pushes to master and PRs just
# build to validate the Dockerfile. Each tag publishes the version tags plus
# `latest`.
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # no packages:write: this job runs npm/build and must never hold the push credential
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The bytecode indexer jar is gitignored, so fetch it into the build
      # context before building. The Dockerfile vendors it into the image so
      # the container never downloads it at runtime.
      - name: Fetch vendored mcsrc-indexer.jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          gh release download tools-v1 \
            --repo ${{ github.repository }} \
            --pattern mcsrc-indexer.jar \
            --dir tools
          ls -l tools/mcsrc-indexer.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # branch/pr tags exist only so non-tag builds have something to label;
          # they are never pushed (the push job runs only on tags). Version tags
          # and `latest` are applied on `v*` tag builds.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Build without pushing, exporting an OCI archive. OCI (not docker) format
      # stores the layers in their final compressed form, so the push job can
      # skopeo-copy the blobs byte-for-byte — preserving the layer digests buildx
      # would have pushed directly. (A docker-archive round-tripped through
      # `docker load`/`docker push` recompresses layers, changing every digest and
      # forcing nodes to cold-pull the whole image on each release.)
      # A single local tag keeps the archive unambiguous for skopeo; the real
      # registry tags are applied at publish time from steps.meta.outputs.tags.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: localhost/modlens:ci
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=oci,dest=/tmp/modlens-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/modlens-image.tar
          retention-days: 1

  push:
    needs: build
    # Publish only from version tags. master/PR builds stop at the build job.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Manual approval gate, same as the npm publish workflow: configure "Required
    # reviewers" on the `release` environment (repo Settings → Environments) so an
    # image only publishes after a human approves the deployment.
    environment: release
    permissions:
      contents: read
      packages: write # only this job — which runs NO dependency code — holds it
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Ensure skopeo
        run: command -v skopeo || { sudo apt-get update && sudo apt-get install -y skopeo; }

      # skopeo copies the compressed blobs from the OCI archive unchanged, so the
      # published layer digests match what buildx pushes directly — nodes keep
      # reusing their cached layers and only pull what actually changed. The first
      # copy uploads all blobs; the remaining tags reuse them server-side.
      - name: Publish image to GHCR
        env:
          TAGS: ${{ needs.build.outputs.tags }}
          REGISTRY: ${{ env.REGISTRY }}
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin <<<"$REGISTRY_PASS"
          echo "$TAGS" | while read -r tag; do
            [ -z "$tag" ] && continue
            echo "Copying image -> $tag"
            skopeo copy --retry-times 3 oci-archive:/tmp/modlens-image.tar "docker://$tag"
          done
