name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Trusted publishing: npm mints a short-lived, per-run credential via OIDC.
      # No NPM_TOKEN secret is stored. Requires a Trusted Publisher to be
      # configured for this package on npmjs.com, linked to this repo + workflow.
      # The package must already exist on npm (do the first publish manually).
      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public --provenance
