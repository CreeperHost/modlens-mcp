name: Publish to npm

on:
  push:
    tags: ["v*"]

# Two-stage release: the OIDC publish credential is isolated from the job that
# runs untrusted dependency code (npm ci / build scripts). The build job has no
# id-token and produces a tarball artifact; the publish job holds id-token but
# runs only `npm publish` on that prebuilt tarball — so a compromised dependency
# cannot scrape the publish credential from memory (the TanStack attack vector).
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # no id-token: this job must never hold the publish credential
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can verify the tag is on the default branch

      # Refuse to build/publish a tag that points at a commit not merged into the
      # default branch — blocks releasing unreviewed code from a side branch.
      - name: Verify tag is on the default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch --no-tags origin "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/$DEFAULT_BRANCH"; then
            echo "Tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not an ancestor of ${DEFAULT_BRANCH} — refusing to publish unreviewed code." >&2
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # The git tag is the single source of truth for the version. Stamp it into
      # package.json so the packed tarball carries the right version (not committed).
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # npm pack does not create --pack-destination, so make it first.
      - name: Pack tarball
        run: |
          mkdir -p ./dist-pack
          npm pack --pack-destination ./dist-pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist-pack/*.tgz
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Manual approval gate: configure "Required reviewers" on the `release`
    # environment (repo Settings → Environments). This job holds the OIDC
    # credential but runs NO dependency code — only `npm publish` of the tarball.
    environment: release
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist-pack

      # Trusted publishing needs a recent npm; the runner's bundled npm may predate it.
      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      # Publishes the prebuilt tarball. Tarball publishes run no package lifecycle
      # scripts, so no untrusted code executes while the OIDC token is present.
      # The ./ prefix is required: without it npm parses "dist-pack/<file>.tgz"
      # as a GitHub repo shorthand (owner/repo) instead of a local tarball.
      - name: Publish
        run: npm publish ./dist-pack/*.tgz --access public --provenance

  # Publishes a GitHub release with auto-generated notes for the tag. Runs only
  # after publish succeeds, so it inherits the default-branch guard (build job)
  # and the environment approval (publish job). Holds no id-token and runs no
  # dependency code — just the GitHub API via `gh`.
  release-notes:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/edit the GitHub release
    steps:
      - name: Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — skipping."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
