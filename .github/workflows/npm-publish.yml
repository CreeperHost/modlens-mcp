name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing + provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      # The git tag is the single source of truth for the version. Stamp it into
      # package.json for this build only (not committed) — no manual version bump
      # in code is needed; just push a vX.Y.Z tag.
      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Trusted publishing: npm mints a short-lived, per-run credential via OIDC.
      # No NPM_TOKEN secret is stored. Requires a Trusted Publisher to be
      # configured for this package on npmjs.com, linked to this repo + workflow.
      # The package must already exist on npm (do the first publish manually).
      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish --access public --provenance
